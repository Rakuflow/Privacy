services:
  app:
    container_name: rakushield-backend
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: npm run dev
    env_file:
      - ./.env
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: ${MONGO_DB_NAME:-test_net}
      PORT: ${PORT:-3001}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    restart: unless-stopped